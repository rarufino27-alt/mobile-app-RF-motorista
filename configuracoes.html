<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurações - GFV</title>

<style>

:root{
  --gold:#D6B85F;
  --gold-strong:#F4D97A;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background: radial-gradient(circle at top,#1A2133 0%,#080A12 70%);
color:#fff;
transition:.3s;
}

/* TEMA CLARO */

body[data-theme="light"]{
background:#f3f4f6;
color:#111;
}

body[data-theme="light"] .card{
background:#ffffff;
border:1px solid rgba(0,0,0,.08);
}

body[data-theme="light"] .option{
border-bottom:1px solid rgba(0,0,0,.08);
}

/* HEADER */

.top-white{
background:#ffffff;
padding:20px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom-left-radius:28px;
border-bottom-right-radius:28px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.logo-img{
height:42px;
border-radius:12px;
}

/* TITULO */

h1{
color:var(--gold);
margin:25px 20px 10px;
font-size:22px;
}

/* CONTAINER */

.container{
padding:0 16px 40px;
max-width:480px;
margin:auto;
}

/* CARD */

.card{
background:rgba(255,255,255,0.04);
border-radius:16px;
padding:16px;
margin-bottom:16px;
border:1px solid rgba(214,184,95,0.15);
}

/* TITULO CARD */

.card-title{
font-weight:700;
margin-bottom:10px;
color:var(--gold);
}

/* OPÇÕES */

.option{
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
transition:.2s;
}

.option:last-child{
border-bottom:none;
}

.option:hover{
opacity:.8;
transform:translateX(3px);
}

/* BADGE */

.badge{
font-size:12px;
background:var(--gold);
color:#000;
padding:3px 8px;
border-radius:20px;
}

/* LINK */

a{
color:var(--gold);
text-decoration:none;
font-weight:600;
}

</style>
</head>

<body>

<div class="top-white">
<img src="logo.png" class="logo-img">
</div>

<h1>Configurações</h1>

<div class="container">

<div class="card">
<div class="card-title">Preferências</div>

<div class="option" onclick="alternarTema()">
Alternar tema
<span id="temaAtual"></span>
</div>

</div>

<div class="card">
<div class="card-title">Sistema</div>

<div class="option">
Versão do aplicativo
<span>1.0.1</span>
</div>

<div class="option" onclick="abrirSuporte()">
Contato do suporte
<span>WhatsApp</span>
</div>

</div>

<br>
<a href="home.html">← Voltar</a>

</div>
  
<script>

/* CARREGAR TEMA */
(function(){
const temaSalvo = localStorage.getItem("rf_theme") || "dark";
document.body.setAttribute("data-theme", temaSalvo);
atualizarLabel();
})();

/* ALTERAR TEMA */
function alternarTema(){
const atual = document.body.getAttribute("data-theme");
const novo = atual === "dark" ? "light" : "dark";
document.body.setAttribute("data-theme", novo);
localStorage.setItem("rf_theme", novo);
atualizarLabel();
}

/* LABEL */
function atualizarLabel(){
const atual = document.body.getAttribute("data-theme");
document.getElementById("temaAtual").innerText =
atual === "dark" ? "🌙 Escuro" : "☀️ Claro";
}

/* WHATSAPP */
function abrirSuporte(){
const mensagem = encodeURIComponent("Olá, preciso de suporte no aplicativo GFV.");
window.open(`https://wa.me/5581989823239?text=${mensagem}`, "_blank");
}

</script>

</body>
</html>
