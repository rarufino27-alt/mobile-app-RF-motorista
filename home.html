<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GFV Viagens</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="core/datamanager.js"></script>

<link rel="stylesheet" href="theme.css/theme.css">
<link rel="stylesheet" href="theme.css/layout.css">
<link rel="stylesheet" href="theme.css/components.css">
<style>
  /* ===== BOTÃO PRINCIPAL ===== */
.btn-confirmar {
  width: 100%;
  padding: 18px;

  font-size: 16px;
  font-weight: 800;

  border-radius: 30px;

  background: linear-gradient(135deg, #ff5a1f, #ff7a3a);
  color: #fff;

  box-shadow:
    0 10px 30px rgba(255,90,31,0.4),
    0 0 20px rgba(255,90,31,0.2);

  transition: all 0.3s ease;

  position: relative;
  overflow: hidden;
}

/* ===== GLOW ANIMADO ===== */
.btn-confirmar::after {
  content: "";
  position: absolute;
  inset: 0;

  background: radial-gradient(circle, rgba(255,255,255,0.3), transparent 60%);
  opacity: 0;

  transition: 0.4s;
}

.btn-confirmar:active::after {
  opacity: 1;
}

/* ===== PULSE ===== */
@keyframes pulseConfirmar {
  0% { transform: scale(1); }
  50% { transform: scale(1.04); }
  100% { transform: scale(1); }
}

/* ===== ATIVO ===== */
.btn-confirmar:not(:disabled) {
  animation: pulseConfirmar 1.5s infinite;
}

/* ===== DESABILITADO (BONITO) ===== */
.btn-confirmar:disabled {
  background: #555;
  color: #999;
  box-shadow: none;
  animation: none;
}

/* ===== CLIQUE ===== */
.btn-confirmar:active {
  transform: scale(0.96);
}
  
</style>
</head>

<body data-theme="dark">

<!-- LOADING -->
<div id="loading" class="loading">
  <div class="loader"></div>
  <span>Carregando rotas...</span>
</div>

<!-- MENU -->
<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
  <h3>Menu</h3>
  <div class="menu-item" onclick="irPara('termos.html')">📜 Regras do Grupo</div>
  <div class="menu-item" onclick="irPara('configuracoes.html')">⚙️ Configurações</div>
</div>

<!-- TOPO -->
<div class="top-bar">
  <div class="logo-area">
    <img src="icons/icon-512.png" class="logo-img">
    <span class="logo-text">GFV VIAGENS</span>
  </div>
  <div class="menu-btn" onclick="abrirMenu()">☰</div>
</div>

<!-- SLIDER -->
<div class="slider">
  <div class="slides" id="slides">

    <div class="slide">
      <div class="slide-box">
        <h2>Tabela <span class="destaque">Oficial</span></h2>
        <p>Preço fixo e justo</p>
        <button class="slide-btn" onclick="abrirModal('origem')">Começar</button>
      </div>
    </div>

    <div class="slide">
      <div class="slide-box">
        <h2>Ganhos <span class="destaque">semanais</span></h2>
        <p>Veja bônus</p>
        <button class="slide-btn" onclick="irPara('termos.html')">Ver regras</button>
      </div>
    </div>

    <div class="slide">
      <div class="slide-box">
        <h2>Suporte rápido</h2>
        <p>Fale com a equipe</p>
        <button class="slide-btn" onclick="window.open('https://wa.me/', '_blank')">Falar</button>
      </div>
    </div>

  </div>
</div>

<!-- INDICADORES -->
<div class="indicadores">
  <div class="dotSlide ativo"></div>
  <div class="dotSlide"></div>
  <div class="dotSlide"></div>
</div>

<!-- CONTEÚDO -->
<div class="container">

  <div class="titulo">
    Para onde <span>vamos</span> hoje?
  </div>

  <div class="card">

    <!-- ORIGEM -->
    <div class="campo" id="origemBtn">
      <div class="campo-left">
        <div class="dot origem"></div>
        <span id="origemTexto">Selecionar origem</span>
      </div>
    </div>

    <!-- DESTINO -->
    <div class="campo" id="destinoBtn">
      <div class="campo-left">
        <div class="dot destino"></div>
        <span id="destinoTexto">Selecionar destino</span>
      </div>
    </div>

    <!-- VEÍCULO -->
    <div class="campo">
      <div class="campo-left">
        <div class="dot" style="background:#3b82f6;"></div>
        <span>Tipo de veículo</span>
      </div>

      <div class="rf-select" id="tipoCarroBtn">
        <span id="tipoCarroTexto">4 lugares</span>
      </div>

      <input type="hidden" id="tipoCarro" value="1">
    </div>

  </div>
</div>

<!-- BOTÃO -->
<div class="bottom">
  <button id="confirmar" class="btn-confirmar" disabled>
  Confirmar rota
</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <input type="text" id="busca" placeholder="Buscar local...">
    <div class="lista" id="lista"></div>
  </div>
</div>

<!-- MODAL VEÍCULO -->
<div class="rf-modal" id="modalTipoCarro">
  <div class="rf-modal-content">
    <div class="rf-option" data-value="1">4 lugares</div>
    <div class="rf-option" data-value="1.5">6 lugares (+50%)</div>
  </div>
</div>

<script>

/* INIT */
async function init(){
  loading.style.display="flex";
  try{
    await DataManager.carregar();
  }catch(e){
    alert("Erro ao carregar rotas.");
  }
  loading.style.display="none";
}
init();

/* SLIDER */
let slideIndex = 0;
const slides = document.getElementById("slides");
const dots = document.querySelectorAll(".dotSlide");

setInterval(()=>{
  slideIndex = (slideIndex + 1) % dots.length;
  slides.style.transform = `translateX(-${slideIndex * 100}%)`;

  dots.forEach(d=>d.classList.remove("ativo"));
  dots[slideIndex].classList.add("ativo");
}, 4000);

/* MENU */
function abrirMenu(){
  menu.classList.add("ativo");
  menuOverlay.style.display="block";
}

function fecharMenu(){
  menu.classList.remove("ativo");
  menuOverlay.style.display="none";
}

function irPara(p){
  window.location.href = p;
}

/* SISTEMA */
let origem = null;
let destino = null;
let modo = null;

const modal = document.getElementById("modal");
const lista = document.getElementById("lista");
const confirmarBtn = document.getElementById("confirmar");

function abrirModal(tipo){
  if(tipo !== "origem" && !origem){
    alert("Selecione a origem primeiro.");
    return;
  }

  modo = tipo;
  modal.style.display = "flex";

  let dados = tipo === "origem"
    ? DataManager.listarOrigens()
    : DataManager.listarDestinos(origem);

  renderLista(dados);
}

function renderLista(arr){
  lista.innerHTML = "";

  arr.forEach(item=>{
    const div = document.createElement("div");
    div.innerText = item;

    div.onclick = ()=>{
      selecionar(item);
      modal.style.display = "none";
    };

    lista.appendChild(div);
  });
}

function selecionar(valor){
  if(modo === "origem"){
    origem = valor;
    origemTexto.innerText = valor;

    destino = null;
    destinoTexto.innerText = "Selecionar destino";
  }

  if(modo === "destino"){
    destino = valor;
    destinoTexto.innerText = valor;
  }

  const ativo = origem && destino;
confirmarBtn.disabled = !ativo;

if(ativo){
  confirmarBtn.classList.add("ativo");
}else{
  confirmarBtn.classList.remove("ativo");
}

origemBtn.onclick = ()=>abrirModal("origem");
destinoBtn.onclick = ()=>abrirModal("destino");

/* VEÍCULO */
tipoCarroBtn.onclick = ()=>modalTipoCarro.style.display="flex";

document.querySelectorAll("#modalTipoCarro .rf-option").forEach(op=>{
  op.onclick = ()=>{
    tipoCarro.value = op.dataset.value;
    tipoCarroTexto.innerText = op.innerText;
    modalTipoCarro.style.display = "none";
  };
});

modalTipoCarro.onclick = e=>{
  if(e.target === modalTipoCarro){
    modalTipoCarro.style.display = "none";
  }
};

/* CONFIRMAR */
confirmarBtn.onclick = ()=>{
  const valor = DataManager.buscarValor(origem, destino) || 0;

  localStorage.setItem("gfv_corrida", JSON.stringify({
    origem,
    destino,
    valor,
    categoria: parseFloat(tipoCarro.value)
  }));

  window.location.href = "resumo.html";
};

/* TEMA */
(function(){
  const tema = localStorage.getItem("gfv_theme") || "dark";
  document.body.setAttribute("data-theme", tema);
})();

</script>

</body>
</html>
