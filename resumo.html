<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Resumo - GFV Viagens</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="theme.css/theme.css">
<link rel="stylesheet" href="theme.css/layout.css">
<link rel="stylesheet" href="theme.css/components.css">

<style>

/* ===== DESTAQUE RESUMO ===== */
.resumo-rota div {
  font-size: 16px;
  margin-bottom: 6px;
  font-weight: 500;
}

/* ===== BADGES ===== */
.badge {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;

  background: rgba(255,90,31,0.15);
  color: var(--primary);

  animation: fadeIn 0.3s ease;
}

/* ===== LINHAS DETALHE ===== */
.linha-detalhe {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 14px;
}

/* ===== TOTAL ===== */
.total-box {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);

  font-size: 18px;
  font-weight: 800;
  color: var(--primary);

  text-align: right;
}

/* ===== ANIMAÇÃO ===== */
@keyframes fadeIn {
  from { opacity:0; transform: translateY(5px);}
  to { opacity:1; transform: translateY(0);}
}

/* ===== TOGGLE ===== */
.detalhe-toggle {
  margin-top: 10px;
  font-size: 13px;
  color: var(--primary);
  cursor: pointer;
}

/* ===== INPUT FEEDBACK ===== */
.rf-select:focus,
input:focus {
  outline: none;
  box-shadow: 0 0 0 2px rgba(255,90,31,0.2);
}

  /* ===== ANIMAÇÃO VALOR ===== */
.valor-animado {
  transition: all 0.3s ease;
}

/* ===== PULSO PREMIUM ===== */
@keyframes pulsePremium {
  0% { transform: scale(0.95); opacity: 0.6; }
  50% { transform: scale(1.05); opacity: 1; }
  100% { transform: scale(1); }
}

.badge {
  animation: pulsePremium 0.4s ease;
}

/* ===== DETALHE ANIMADO ===== */
#detalheCompleto {
  animation: fadeIn 0.3s ease;
}

/* ===== TOTAL PREMIUM ===== */
.total-box {
  background: linear-gradient(135deg, rgba(255,90,31,0.15), transparent);
  padding: 12px;
  border-radius: 12px;
}

/* ===== INTERAÇÃO ===== */
.card {
  transition: transform 0.2s ease;
}

.card:active {
  transform: scale(0.98);
}
</style>

</head>

<body data-theme="dark">

<div class="menu-overlay" id="menuOverlay" onclick="fecharMenu()"></div>

<div class="menu" id="menu">
  <h3>Menu</h3>
  <div class="menu-item" onclick="irPara('index.html')">🚗 Nova viagem</div>
  <div class="menu-item" onclick="irPara('termos.html')">📜 Regras</div>
  <div class="menu-item" onclick="irPara('configuracoes.html')">⚙️ Configurações</div>
</div>

<div class="top-bar">
  <div class="logo-area">
    <img src="icons/icon-512.png" class="logo-img">
    <span class="logo-text">GFV VIAGENS</span>
  </div>
  <div class="menu-btn" onclick="abrirMenu()">☰</div>
</div>

<div class="container">

  <!-- ROTA -->
  <div class="card">
    <div class="card-title">Resumo da viagem</div>
    <div id="rota" class="resumo-rota"></div>
  </div>

  <!-- OBS -->
  <div class="card">
    <div class="card-title">Observação</div>
    <textarea id="obs" placeholder="Alguma observação para o motorista?"></textarea>
  </div>

  <!-- PAGAMENTO -->
  <div class="card">
    <div class="card-title">Pagamento</div>
    <select id="pagamento" class="rf-select">
      <option value="dinheiro">Dinheiro</option>
      <option value="pix">Pix</option>
      <option value="debito">Cartão Débito</option>
      <option value="credito">Cartão Crédito</option>
    </select>
  </div>

  <!-- ADICIONAIS -->
  <div class="card">
    <div class="card-title">Adicionais</div>

    <div class="campo">
      <span>Taxa de Feira</span>
      <select id="feira" class="rf-select">
        <option value="0">Sem</option>
        <option value="5">1 carrinho</option>
        <option value="7.99">2+ carrinhos</option>
      </select>
    </div>

    <div class="campo">
      <span>Animal</span>
      <select id="animal" class="rf-select">
        <option value="0">Nenhum</option>
        <option value="4.99">Pequeno</option>
        <option value="7.99">Médio</option>
        <option value="11.99">Grande</option>
      </select>
    </div>

    <div class="campo">
      <span>Espera (min)</span>
      <input type="number" id="espera" class="rf-select" value="0">
    </div>

    <div class="campo">
      <span>Saída de Praia</span>
      <select id="saidaPraia" class="rf-select">
        <option value="0">Não</option>
        <option value="10">Sim (+10)</option>
      </select>
    </div>

  </div>

  <!-- VALORES -->
  <div class="card">
    <div class="card-title">Valores</div>

    <div id="detalhe"></div>

    <div class="detalhe-toggle" onclick="toggleDetalhe()">
      Ver detalhes
    </div>

    <div id="detalheCompleto" style="display:none; margin-top:10px;"></div>
  </div>

</div>

<div class="bottom">
  <div style="text-align:center; margin-bottom:10px;">
    <strong id="valorFinal">R$ 0,00</strong>
  </div>
  <button onclick="solicitar()">Enviar via WhatsApp</button>
</div>

<script>

/* MENU */
function abrirMenu(){
  menu.classList.add("ativo");
  menuOverlay.style.display="block";
}
function fecharMenu(){
  menu.classList.remove("ativo");
  menuOverlay.style.display="none";
}
function irPara(p){
  window.location.href=p;
}

/* DADOS */
const corrida = JSON.parse(localStorage.getItem("gfv_corrida"));
if(!corrida) window.location.href="index.html";

let { origem, destino, valor, categoria = 1 } = corrida;

/* ROTA */
function montarRota(){
  document.getElementById("rota").innerHTML = `
    <div>📍 ${origem}</div>
    <div>🏁 ${destino}</div>
  `;
}

/* CALCULO */
function calcular(){

  let base = parseFloat(valor)||0;
  let total = base;

  let html = "";

  const feira = parseFloat(feiraEl.value)||0;
  const animal = parseFloat(animalEl.value)||0;
  const praia = parseFloat(saidaPraiaEl.value)||0;
  const espera = parseFloat(esperaEl.value)||0;

  function linha(nome, valor){
    return `
      <div class="linha-detalhe">
        ${nome}
        <span class="badge">R$ ${valor.toFixed(2)}</span>
      </div>
    `;
  }

  if(feira > 0){
    html += linha("Feira", feira);
    total += feira;
  }

  if(animal > 0){
    html += linha("Animal", animal);
    total += animal;
  }

  if(praia > 0){
    html += linha("Saída Praia", praia);
    total += praia;
  }

  if(espera > 5){
    let val = 3 + ((espera-5)*0.6);
    html += linha("Espera", val);
    total += val;
  }

  document.getElementById("detalhe").innerHTML = html;

  animarValor(total);

  document.getElementById("detalheCompleto").innerHTML = html + `
    <div class="total-box">Total: R$ ${total.toFixed(2)}</div>
  `;
}
  
const feiraEl = document.getElementById("feira");
const animalEl = document.getElementById("animal");
const saidaPraiaEl = document.getElementById("saidaPraia");
const esperaEl = document.getElementById("espera");

document.querySelectorAll("select,input").forEach(e=>{
  e.addEventListener("change", calcular);
});

  function animarValor(valorFinal){

  const el = document.getElementById("valorFinal");

  let atual = parseFloat(el.innerText.replace("R$","").replace(",",".") || 0);

  let incremento = (valorFinal - atual) / 10;

  let i = 0;

  const intervalo = setInterval(()=>{

    atual += incremento;
    i++;

    el.innerText = "R$ " + atual.toFixed(2);

    if(i >= 10){
      el.innerText = "R$ " + valorFinal.toFixed(2);
      clearInterval(intervalo);
    }

  }, 20);

}
  
function toggleDetalhe(){
  const el = document.getElementById("detalheCompleto");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function solicitar(){
  const total = document.getElementById("valorFinal").innerText;

  const msg = `*RECIBO GFV*  
Origem: ${origem}  
Destino: ${destino}  

Total: ${total}`;

  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

montarRota();
calcular();

</script>

</body>
</html>
