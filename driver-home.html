<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RF Motorista</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="core/ui/rf-theme-motorista.css">
<script src="core/datamanager.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

.logo{
  font-weight:900;
  font-size:1.3rem;
}

.status-badge{
  font-size:.8rem;
  padding:6px 14px;
  border-radius:20px;
  background:#1e293b;
}

/* CENTRO */
.center-area{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  position:relative;
}

/* RADAR */
.radar{
  width:220px;
  height:220px;
  border-radius:50%;
  border:2px solid rgba(214,184,95,.4);
  position:relative;
  animation:rotate 5s linear infinite;
}

.radar::before,
.radar::after{
  content:"";
  position:absolute;
  border-radius:50%;
  border:2px solid rgba(214,184,95,.2);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.radar::before{
  width:150px;
  height:150px;
}

.radar::after{
  width:80px;
  height:80px;
}

@keyframes rotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.status-text{
  margin-top:25px;
  font-size:1.1rem;
  opacity:.8;
  animation:fadeText 3s infinite;
}

@keyframes fadeText{
  0%{opacity:1}
  50%{opacity:.4}
  100%{opacity:1}
}

/* BOTÃO OFFLINE */
.offline-btn{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:90px;
  height:90px;
  border-radius:50%;
  border:none;
  background:var(--rf-red);
  color:#fff;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 0 30px rgba(239,68,68,.5);
  transition:.3s;
}

.offline-btn:hover{
  transform:translateX(-50%) scale(1.05);
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">RF</div>
  <div class="status-badge">ONLINE</div>
</div>

<div class="center-area">

  <div class="radar"></div>

  <div class="status-text">
    Procurando viagens próximas...
  </div>

</div>

<button class="offline-btn" onclick="ficarOffline()">
  OFF
</button>

<script>

/* ================= INICIALIZAÇÃO ================= */

document.addEventListener("DOMContentLoaded", ()=>{

  if(!DataManager.isOnline()){
    window.location.href="offline.html";
    return;
  }

  iniciarSimulacao();

});

/* ================= OFFLINE ================= */

function ficarOffline(){
  DataManager.setOnline(false);

  document.body.style.transition="opacity .25s ease";
  document.body.style.opacity="0";

  setTimeout(()=>{
    window.location.href="offline.html";
  },250);
}

/* ================= SIMULAÇÃO ================= */

function iniciarSimulacao(){

  setTimeout(()=>{

    if(!DataManager.isOnline()) return;

    // cria corrida simulada
    const corrida = DataManager.criarCorridaSimulada();

    if(corrida){
      window.location.href="corrida-ativa.html";
    }

  },5000);

}

</script>

</body>
</html>
